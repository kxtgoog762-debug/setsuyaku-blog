baseURL = "https://setsuyaku-blog.pages.dev/"
title = "ゆる節約ライフ"
languageCode = "ja"
defaultTheme = "light"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
  pagerSize = 10

[params]
  author = "管理人"
  description = "頑張らなくていい節約術を発信するブログ。固定費削減・ポイ活・家計管理など、誰でもすぐ実践できる方法を紹介します。"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  comments = false

  [params.homeInfoParams]
    Title = "💰 ゆる節約ライフへようこそ"
    Content = """
「頑張らなくていい節約」をテーマに、固定費削減・ポイ活・家計管理の情報を発信しています。
生活の質はそのままで、**自然とお金が貯まる仕組み**を一緒に作りましょう。

👉 [管理人プロフィールはこちら](/profile/)
"""

  [params.analytics.google]
    SiteVerificationTag = "28pq5v3ziJSuspT90fUYBo7xj8zUythUM2Zmr2amMeY"

[services]
  [services.googleAnalytics]
    ID = "G-JMT37ZQS9Y"

