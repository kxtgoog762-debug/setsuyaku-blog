{{- /* 記事ページ（/posts/配下）のみ表示 */ -}}
{{- if hasPrefix .RelPermalink "/posts/" }}
<style>
  .author-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    margin: 20px 0 28px;
    background: #f7f6f1;
    border-left: 4px solid #c9a76e;
    border-radius: 6px;
    font-size: 0.92em;
    line-height: 1.55;
  }
  .author-card-icon {
    flex: 0 0 56px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: transparent;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6em;
    font-weight: bold;
    overflow: hidden;
  }
  .author-card-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .author-card-text {
    flex: 1;
    min-width: 0;
  }
  .author-card-label {
    display: block;
    font-size: 0.78em;
    color: #8a7a55;
    margin-bottom: 2px;
    letter-spacing: 0.05em;
  }
  .author-card-bio {
    margin: 0;
    color: #333;
  }
  .author-card-bio strong {
    color: #b8893f;
  }
  .author-card-bio a {
    color: #8a6a30;
    text-decoration: underline;
    margin-left: 4px;
    white-space: nowrap;
  }
  @media (max-width: 480px) {
    .author-card {
      gap: 10px;
      padding: 12px 14px;
    }
    .author-card-icon {
      flex: 0 0 44px;
      width: 44px;
      height: 44px;
      font-size: 1.3em;
    }
  }
</style>
<div class="author-card">
  <div class="author-card-icon" aria-hidden="true">
    <img src="/images/yattokame-icon.png" alt="やっとかめ" />
  </div>
  <div class="author-card-text">
    <span class="author-card-label">この記事を書いた人</span>
    <p class="author-card-bio">
      <strong>28歳・資産2,000万円</strong>のFラン卒会社員。都内一人暮らし。35歳FIREを目指して新NISA満額積立中。<a href="/profile/">プロフィール</a>
    </p>
  </div>
</div>
{{- end }}
