{{- /* Head custom content area start */ -}}
<style>
  /* ====================================================================
     === サイト全体のテーマカラー（黄緑＝バナーの世界観に合わせる） ===
     ==================================================================== */
  :root,
  html[data-theme="light"] {
    --theme: #f3f8ec;       /* 全体背景：薄い黄緑 */
    --entry: #ffffff;        /* 記事カードは白で浮かせる */
    --tertiary: #e4ecd6;     /* 区切り線：黄緑トーン */
    --content: #333;
  }
  body {
    background: #f3f8ec;
  }
  /* 記事本文・カード類は白で読みやすさをキープ */
  .post-entry,
  .first-entry,
  .page-content,
  article.post-single {
    background: #ffffff;
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
  }
  /* ヘッダーも黄緑トーンで統一 */
  .header {
    background: #ebf3da !important;
    border-bottom: 2px solid #cfdfae !important;
  }
  /* フッターも軽く色付け */
  .footer {
    background: transparent;
  }

  /* ====================================================================
     === グローバルメニュー強化（リッチ化） ===
     ==================================================================== */
  .nav .menu,
  .header-nav .menu {
    gap: 4px;
  }
  .nav .menu li a,
  .header-nav .menu li a {
    padding: 8px 14px;
    border-radius: 8px;
    font-weight: 600;
    transition: all 0.2s ease;
  }
  .nav .menu li a:hover,
  .header-nav .menu li a:hover {
    background: #d8e8b8;
    color: #4a6a1f;
  }
  .nav .menu li a .active,
  .header-nav .menu li a .active {
    background: #7ba23c;
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
  }

  /* ====================================================================
     === メインコンテンツ + サイドバーの2カラムレイアウト ===
     ==================================================================== */
  .main {
    max-width: calc(var(--main-width) + var(--gap) * 2 + 280px) !important;
  }
  .main-with-sidebar {
    display: flex;
    gap: 32px;
    align-items: flex-start;
  }
  .main-content {
    flex: 1;
    min-width: 0;
  }
  .sidebar {
    flex: 0 0 280px;
    width: 280px;
    position: sticky;
    top: 90px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    scrollbar-width: thin;
  }
  /* スマホでは縦並びに */
  @media (max-width: 900px) {
    .main-with-sidebar {
      flex-direction: column;
    }
    .sidebar {
      flex: 1 1 auto;
      width: 100%;
      position: static;
      max-height: none;
      overflow-y: visible;
    }
  }

  /* ====================================================================
     === サイドバーの装飾 ===
     ==================================================================== */
  .sidebar-box {
    background: #fffdf8;
    border: 1px solid #f0ece0;
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 18px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.03);
  }
  .sidebar-title {
    font-size: 0.95em;
    font-weight: 700;
    color: #8a6a30;
    margin: 0 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #c9a76e;
    letter-spacing: 0.04em;
  }
  /* プロフィール枠 */
  .sidebar-profile {
    text-align: center;
  }
  .sidebar-profile-icon {
    width: 88px;
    height: 88px;
    margin: 0 auto 10px;
    border-radius: 50%;
    overflow: hidden;
    background: #f7f6f1;
  }
  .sidebar-profile-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .sidebar-profile-name {
    font-weight: 700;
    color: #b8893f;
    margin-bottom: 8px;
  }
  .sidebar-profile-bio {
    font-size: 0.85em;
    color: #555;
    line-height: 1.55;
    margin: 0 0 12px;
  }
  .sidebar-profile-link {
    display: inline-block;
    font-size: 0.85em;
    color: #8a6a30;
    text-decoration: underline;
  }
  /* 検索リンク */
  .sidebar-search-link {
    display: block;
    background: #f7f6f1;
    border: 1px solid #e6e0cf;
    color: #8a6a30;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.9em;
    transition: all 0.2s;
  }
  .sidebar-search-link:hover {
    background: #c9a76e;
    color: #fff;
    border-color: #c9a76e;
  }
  /* リスト共通 */
  .sidebar-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .sidebar-list li {
    border-bottom: 1px dashed #ece6d3;
  }
  .sidebar-list li:last-child {
    border-bottom: none;
  }
  .sidebar-list li a {
    display: block;
    padding: 9px 4px;
    font-size: 0.88em;
    color: #444;
    text-decoration: none;
    transition: color 0.2s;
    line-height: 1.4;
  }
  .sidebar-list li a:hover {
    color: #b8893f;
  }
  /* カテゴリリスト */
  .sidebar-list-categories li a {
    font-weight: 500;
  }
  /* CTAボックス */
  .sidebar-cta {
    background: linear-gradient(135deg, #fff6e3 0%, #fff 100%);
    border-color: #c9a76e;
  }
  .sidebar-cta-text {
    font-size: 0.88em;
    color: #555;
    margin: 0 0 12px;
    line-height: 1.55;
  }
  .sidebar-cta-button {
    display: block;
    background: #c9a76e;
    color: #fff;
    text-align: center;
    padding: 11px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.9em;
    text-decoration: none;
    transition: all 0.2s;
  }
  .sidebar-cta-button:hover {
    background: #b8893f;
    transform: translateY(-1px);
  }

  /* === トップページのサイトバナー === */
  .site-banner {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
    margin: 0 0 1.5em 0;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
  }
  /* バナー画像にタイトル情報が含まれるため、h1テキストはスクリーンリーダー専用にして非表示 */
  .first-entry.home-info > header.entry-header {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* === 会話吹き出し（やっとかめ × まなぶくん） === */
  .chat {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 18px 0;
  }
  .chat-right {
    flex-direction: row-reverse;
  }
  .chat-avatar {
    flex: 0 0 64px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    overflow: hidden;
    background: #f7f6f1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-avatar img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  /* 会話シーンでは2人が向かい合うように、左側のやっとかめのみ左右反転 */
  .chat-yattokame .chat-avatar img {
    transform: scaleX(-1);
  }
  .chat-name {
    display: block;
    text-align: center;
    font-size: 0.72em;
    color: #8a7a55;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .chat-avatar-wrap {
    flex: 0 0 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chat-bubble {
    position: relative;
    flex: 1;
    max-width: calc(100% - 84px);
    padding: 12px 16px;
    border-radius: 14px;
    background: #f7f6f1;
    color: #333;
    line-height: 1.65;
    font-size: 0.94em;
  }
  .chat-bubble p {
    margin: 0 0 0.4em;
  }
  .chat-bubble p:last-child {
    margin-bottom: 0;
  }
  .chat-bubble strong {
    color: #b8893f;
  }
  /* やっとかめ（左・先輩・薄黄色） */
  .chat-yattokame .chat-bubble {
    background: #fdf6e6;
    border: 1px solid #ecdcb3;
  }
  .chat-yattokame .chat-bubble::before {
    content: "";
    position: absolute;
    left: -8px;
    top: 18px;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 8px 10px 8px 0;
    border-color: transparent #fdf6e6 transparent transparent;
    filter: drop-shadow(-1px 0 0 #ecdcb3);
  }
  /* まなぶくん（右・後輩・薄水色） */
  .chat-manabu .chat-bubble {
    background: #eef5fb;
    border: 1px solid #cfe0ee;
  }
  .chat-manabu .chat-bubble::before {
    content: "";
    position: absolute;
    right: -8px;
    top: 18px;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 8px 0 8px 10px;
    border-color: transparent transparent transparent #eef5fb;
    filter: drop-shadow(1px 0 0 #cfe0ee);
  }
  @media (max-width: 480px) {
    .chat {
      gap: 8px;
    }
    .chat-avatar-wrap {
      flex: 0 0 50px;
    }
    .chat-avatar {
      flex: 0 0 50px;
      width: 50px;
      height: 50px;
    }
    .chat-bubble {
      max-width: calc(100% - 64px);
      font-size: 0.9em;
      padding: 10px 14px;
    }
  }
</style>
{{- /* Head custom content area end */ -}}
